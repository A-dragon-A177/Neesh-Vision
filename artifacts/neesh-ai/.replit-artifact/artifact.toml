kind = "web"
previewPath = "/"
title = "Neesh AI Landing Page"
version = "1.0.0"
id = "artifacts/neesh-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23943

[services.development]
run = "pnpm --filter @workspace/neesh-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neesh-ai", "run", "build" ]
publicDir = "artifacts/neesh-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23943"
BASE_PATH = "/"
